<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crystal Clear Shooter</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./script.js">
    <style>
        body { 
            background: #000; margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; 
            overflow: hidden; touch-action: none; font-family: sans-serif;
        }
        .dashboard {
            position: fixed; top: 15px; display: flex; justify-content: space-around;
            width: 85%; max-width: 400px; padding: 12px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.2); z-index: 100;
        }
        .stat-item { text-align: center; color: #fff; }
        .stat-label { color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 1px; font-weight: bold; }
        .stat-value { font-size: 20px; font-weight: 900; display: block; }
        canvas { display: block; width: 100vw; height: 100vh; image-rendering: -webkit-optimize-contrast; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="stat-item"><span class="stat-label">BOSQICH</span><span id="levelVal" class="stat-value">01</span></div>
        <div class="stat-item"><span class="stat-label">BALL</span><span id="scoreVal" class="stat-value">0000</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Unumdorlikni oshirish

        // ENG TINIQ VA YORQIN 10 TA RANG
        const colors = [
            '#FF0000', // To'q Qizil
            '#00FF00', // Yorqin Yashil
            '#0099FF', // Tiniq Ko'k
            '#FFFF00', // Sariq
            '#FF00FF', // Fuksiy
            '#00FFFF', // Akva
            '#FF6600', // Olovrang
            '#FFFFFF', // Oq
            '#FF007F', // Atirgul
            '#9900FF'  // Binafsha
        ];

        let bubbles = [], projectiles = [], fallingBubbles = [], score = 0, currentLevel = 1;
        let nextAmmoColor = '';
        let bubbleRad;

        function resize() {
            // Retina displeylar uchun tiniqlikni oshirish
            const ratio = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * ratio;
            canvas.height = window.innerHeight * ratio;
            ctx.scale(ratio, ratio);
            
            bubbleRad = window.innerWidth < 600 ? window.innerWidth / 22 : 18;
            initBubbles();
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPop() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function initBubbles() {
            bubbles = [];
            let rows = 5 + Math.min(currentLevel, 5);
            let cols = Math.floor(window.innerWidth / (bubbleRad * 2.15));
            let offsetX = (window.innerWidth - (cols * bubbleRad * 2.15)) / 2 + bubbleRad;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    bubbles.push({
                        x: c * (bubbleRad * 2.15) + offsetX,
                        y: r * (bubbleRad * 2.05) + 130,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        active: true
                    });
                }
            }
            nextAmmoColor = pickSmartColor();
        }

        function pickSmartColor() {
            const active = bubbles.filter(b => b.active).map(b => b.color);
            return active.length > 0 ? active[Math.floor(Math.random() * active.length)] : colors[0];
        }

        function handleInput(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const angle = Math.atan2(clientY - (window.innerHeight - 80), clientX - (window.innerWidth / 2));
            projectiles.push({ x: window.innerWidth / 2, y: window.innerHeight - 80, vx: Math.cos(angle) * 18, vy: Math.sin(angle) * 18, color: nextAmmoColor });
            setTimeout(() => { nextAmmoColor = pickSmartColor(); }, 30);
        }

        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
        canvas.addEventListener('mousedown', handleInput);

        function popChain(target) {
            target.active = false; score += 15; playPop();
            bubbles.forEach(b => {
                if (b.active && b.color === target.color && Math.hypot(b.x - target.x, b.y - target.y) < bubbleRad * 2.5) popChain(b);
            });
        }

        function dropFloats() {
            const connected = new Set();
            const roots = bubbles.filter(b => b.active && b.y < 160);
            const walk = (b) => {
                if (connected.has(b)) return;
                connected.add(b);
                bubbles.forEach(o => {
                    if (o.active && !connected.has(o) && Math.hypot(b.x - o.x, b.y - o.y) < bubbleRad * 2.5) walk(o);
                });
            };
            roots.forEach(walk);
            bubbles.forEach(b => {
                if (b.active && !connected.has(b)) {
                    b.active = false;
                    fallingBubbles.push({ ...b, vy: 4, alpha: 1 });
                    score += 30;
                }
            });
        }

        function update() {
            projectiles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < bubbleRad || p.x > window.innerWidth - bubbleRad) p.vx *= -1;

                bubbles.forEach(b => {
                    if (b.active && Math.hypot(p.x - b.x, p.y - b.y) < bubbleRad * 1.7) {
                        const angle = Math.atan2(p.y - b.y, p.x - b.x);
                        const newX = b.x + Math.cos(angle) * (bubbleRad * 2);
                        const newY = b.y + Math.sin(angle) * (bubbleRad * 2);

                        if (p.color === b.color) { popChain(b); dropFloats(); }
                        else bubbles.push({ x: newX, y: newY, color: p.color, active: true });
                        projectiles.splice(i, 1);
                    }
                });

                if (p.y < 120) {
                    bubbles.push({ x: p.x, y: 130, color: p.color, active: true });
                    projectiles.splice(i, 1); dropFloats();
                }
            });

            fallingBubbles.forEach((fb, i) => { fb.y += fb.vy; fb.alpha -= 0.03; if (fb.alpha <= 0) fallingBubbles.splice(i, 1); });
            document.getElementById('scoreVal').innerText = score.toString().padStart(4, '0');
            document.getElementById('levelVal').innerText = currentLevel.toString().padStart(2, '0');
            if (bubbles.length > 0 && !bubbles.some(b => b.active)) { currentLevel++; initBubbles(); }
        }

        function drawBubble(x, y, color, alpha, scale = 1) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            
            // ASOSIY TINIQ RANG (ShadowBlur olib tashlandi, o'rniga qalin border qo'shildi)
            ctx.beginPath();
            ctx.arc(0, 0, bubbleRad, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
            
            // SHISHASIMON EFFEKT (Highlight)
            const grad = ctx.createRadialGradient(-bubbleRad/2, -bubbleRad/2, 1, -bubbleRad/3, -bubbleRad/3, bubbleRad);
            grad.addColorStop(0, 'rgba(255, 255, 255, 0.9)'); // Juda tiniq oq nuqta
            grad.addColorStop(0.3, 'rgba(255, 255, 255, 0.2)');
            grad.addColorStop(1, 'transparent');
            
            ctx.fillStyle = grad;
            ctx.fill();

            // TINIQ KONTUR
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore();
        }

        function render() {
            ctx.fillStyle = "#000"; // Fonni tozalash
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            bubbles.forEach(b => b.active && drawBubble(b.x, b.y, b.color, 1));
            fallingBubbles.forEach(fb => drawBubble(fb.x, fb.y, fb.color, fb.alpha, 0.9));
            projectiles.forEach(p => drawBubble(p.x, p.y, p.color, 1));
            
            // OTUVCHI (Tayyor o'q)
            drawBubble(window.innerWidth / 2, window.innerHeight - 80, nextAmmoColor, 1, 1.3);
            
            // Yo'nalish chizig'i (yordamchi tiniq chiziq)
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.setLineDash([5, 10]);
            ctx.beginPath();
            ctx.moveTo(window.innerWidth/2, window.innerHeight - 100);
            ctx.lineTo(window.innerWidth/2, window.innerHeight - 150);
            ctx.stroke();
            ctx.setLineDash([]);

            update();
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', resize);
        resize(); render();
    </script>
</body>
</html>
